name: Deploy Cloudflare Worker

on:
  push: {}
  workflow_dispatch: {}

concurrency:
  group: cloudflare-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    env:
      DIST_DIR: client/build/dist/composeWebCompatibility/productionExecutable

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate Cloudflare configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing secret: CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Build Compose web distribution
        run: |
          chmod +x ./gradlew
          ./gradlew :client:composeCompatibilityBrowserDistribution

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: compose-web-compatibility
          path: ${{ env.DIST_DIR }}
          if-no-files-found: error

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
